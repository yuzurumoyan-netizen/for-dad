<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>一份礼物</title>
    <link rel="stylesheet" href="solar.css?v=999">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="preload" href="music/theshire.mp3" as="audio">
</head>

<body>
    <audio id="bgm" loop>
    <source src="music/theshire.mp3" type="audio/mpeg">
    </audio>

    <button id="solar-music-btn">🎵 继续音乐</button>

    <div id="stars"></div>
    <a id="back-btn" href="#">← 返回地球</a>

    <div id="solar-story">
    夜晚从地球上抬头看向星空，想起了小时候我们总会去天文馆……
    </div>

    <div class="solar-system">
    <div class="sun"></div>

    <div class="orbit orbit1">
        <div class="planet mercury"></div>
    </div>

    <div class="orbit orbit2">
        <div class="planet venus"></div>
    </div>

    <div class="orbit orbit3">
        <div class="planet earth"></div>
    </div>

    <div class="orbit orbit4">
        <div class="planet mars"></div>
    </div>

    <div class="orbit orbit5">
        <div class="planet jupiter"></div>
    </div>

    <div class="orbit orbit6">
        <div class="planet saturn"></div>
    </div>

    <div class="orbit orbit7">
        <div class="planet uranus"></div>
    </div>

    <div class="orbit orbit8">
        <div class="planet neptune"></div>
    </div>
</div>

    <script>
const bgm = document.getElementById("bgm");

const solarMusicBtn = document.getElementById("solar-music-btn");

solarMusicBtn.onclick = () => {
    const savedTime = localStorage.getItem("musicTime");

    if (savedTime) {
        bgm.currentTime = parseFloat(savedTime);
    }

    bgm.play();

    localStorage.setItem("musicShouldPlay", "true");
    solarMusicBtn.style.display = "none";
};

bgm.addEventListener("loadedmetadata", () => {
    const savedTime = localStorage.getItem("musicTime");

    if (savedTime) {
        bgm.currentTime = parseFloat(savedTime);
        bgm.play();
    }
});

document.getElementById("back-btn").onclick = (e) => {
    e.preventDefault();

    localStorage.setItem("musicTime", bgm.currentTime);
    localStorage.setItem("musicShouldPlay", "true");
    sessionStorage.setItem("skipIntro", "true");

    window.location.href = "index.html";
};

const stars = document.getElementById("stars");

for (let i = 0; i < 300; i++) {
    const star = document.createElement("div");

    star.className = "star";

    const size = Math.random() * 3;

    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    star.style.opacity = Math.random();

    stars.appendChild(star);
}

const planetSettings = [
    { orbit: ".orbit1", planet: ".mercury", speed: 0.0035, angle: 0 },
    { orbit: ".orbit2", planet: ".venus", speed: 0.0020, angle: 1 },
    { orbit: ".orbit3", planet: ".earth", speed: 0.0015, angle: 2 },
    { orbit: ".orbit4", planet: ".mars", speed: 0.0011, angle: 3 },
    { orbit: ".orbit5", planet: ".jupiter", speed: 0.0008, angle: 4 },
    { orbit: ".orbit6", planet: ".saturn", speed: 0.0006, angle: 5 },
    { orbit: ".orbit7", planet: ".uranus", speed: 0.0004, angle: 2.5 },
    { orbit: ".orbit8", planet: ".neptune", speed: 0.0003, angle: 5.5 }
];

function animatePlanets() {
    planetSettings.forEach(item => {
        const orbit = document.querySelector(item.orbit);
        const planet = document.querySelector(item.planet);

        const rx = orbit.offsetWidth / 2;
        const ry = orbit.offsetHeight / 2;

        item.angle += item.speed;

        const x = rx + Math.cos(item.angle) * rx;
        const y = ry + Math.sin(item.angle) * ry;

        planet.style.left = x + "px";
        planet.style.top = y + "px";
    });

    requestAnimationFrame(animatePlanets);
}

animatePlanets();

</script>

</body>
</html>
