<!DOCTYPE html>
<html>
<head>
    <title>一份礼物</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="preload" href="music/theshire.mp3" as="audio">
</head>

<body>

    <div id="start-screen">
    <div class="start-content">
        <div class="start-title">记忆加载中</div>
        <button id="start-btn">▶ 点击继续</button>
       </div>
    </div>

    <h1>父亲节快乐老爸！</h1>

    <p>
        希望在我回去的时候你已经瘦了哈哈哈哈
    </p>

    <button id="pause-btn">⏸</button>
    <button id="solar-btn">点击进入太阳系 ✨</button>

    <button id="music-btn"></button>

    <audio id="bgm" loop>
    <source src="music/theshire.mp3" type="audio/mpeg">
    </audio>

    <div id="globe-container"></div>

    <div id="story-box">
        提示：点击地点，记忆加载中～转动地球仪，可手动看位置
    </div>

    <div id="photo-modal" class="hidden">
        <div class="modal-content">
            <button id="close-modal">×</button>
            <div id="photo-gallery"></div>

            <div id="photo-hint">
                点击照片 ➜ 放大查看
            </div>
        </div>
    </div>

    <div id="image-modal" class="hidden">

    <button id="prev-image">◀</button>

    <img id="big-image">

    <button id="next-image">▶</button>

    <div id="image-counter"></div>

    <span id="close-image">&times;</span>

    </div>

    <script src="https://unpkg.com/globe.gl"></script>
    <script type="module" src="script.js"></script>

</body>
</html>
